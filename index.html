<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 완벽한 다크모드 선언으로 모바일 브라우저 색상 충돌 원천 차단 -->
    <meta name="color-scheme" content="dark">
    <title>IK BOOKMARK</title>
    
    <!-- ★ 브라우저 탭에 표시될 아이콘(파비콘) 설정 -->
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png"> <!-- 모바일 홈화면 추가 시 아이콘 -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 깊이감 있는 프리미엄 다크 그라데이션 배경 */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #09090b 100%);
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            overflow-y: auto; 
            -webkit-font-smoothing: antialiased; /* 텍스트 렌더링 고급화 */
            padding: 40px 20px; /* 창을 줄였을 때 여백 확보 */
        }

        /* 메인 슬라이드 캔버스 */
        .slide-container {
            width: 100%;
            max-width: 960px; /* 균형 잡힌 4열 배치를 위해 최적화된 고급스러운 너비 */
            min-height: 50vh;
            height: auto; 
            /* 은은한 네이비 빛이 도는 다크 스페이스 배경 */
            background: linear-gradient(145deg, #111827 0%, #0f172a 50%, #1e1b4b 100%);
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden; 
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 헤더 영역 */
        .header-bar {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            padding: 0 35px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            display: flex;
            align-items: center;
            justify-content: center; 
            height: 52px; 
            flex-shrink: 0;
            z-index: 10;
        }

        .header-title {
            color: #e2e8f0; 
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 5px; 
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* 중앙 영역 */
        .bookmark-grid {
            margin: 15px; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            flex-grow: 1;
        }

        .column {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* 투명하고 미니멀한 카테고리 박스 */
        .category-box {
            display: flex;
            flex-direction: column;
            gap: 24px;
            background: transparent; 
            border: none;
            box-shadow: none;
        }

        .cat-title {
            color: #94a3b8; /* 세련된 실버 그레이 */
            font-size: 16px; 
            font-weight: 600; 
            border-bottom: 1px solid rgba(148, 163, 184, 0.15); 
            padding-bottom: 10px;
            margin: 0;
            letter-spacing: 1.5px;
            text-align: center;
        }

        /* ★ 데스크탑과 모바일에서 각각 다르게 작동하는 Grid 시스템 구성 */
        .links-wrapper {
            display: grid;
            /* 데스크탑 기본: 완벽히 동일한 사이즈를 보장하는 4열 균등 배치 */
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
            width: 100%;
        }

        /* ★ 초미니멀하고 극도로 절제된 테두리를 가진 유리 버튼 */
        .link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 8px; /* 한층 미니멀해진 세련된 세로 폭 */
            background-color: rgba(255, 255, 255, 0.015); /* 극도로 절제된 반투명 배경 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #94a3b8; /* 더 미니멀하고 눈이 편안한 텍스트 컬러 */
            font-size: 13px; /* 가독성과 트렌디함을 잡은 정밀 폰트 스케일 */
            font-weight: 500;
            border-radius: 6px; 
            cursor: pointer;
            
            /* 테두리를 거의 완벽히 보이지 않게 투명도를 최대로 낮춘 미니멀 보더 */
            border: 1px solid rgba(255, 255, 255, 0.01); 
            
            text-align: center;
            white-space: normal; /* 긴 이름도 안전하게 감싸지도록 허용 */
            word-break: keep-all;
            min-height: 44px; /* 줄바꿈이 일어나도 모든 버튼 높이가 데스크탑에서 통일되도록 제어 */
            width: 100%; /* 그리드 셀에 가득 들어맞음 */
            
            /* 프레스 감각을 극대화하기 위한 부드러운 반응 곡선 속도 적용 */
            transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        background-color 0.25s ease, 
                        color 0.25s ease, 
                        border-color 0.25s ease,
                        box-shadow 0.25s ease;
            user-select: none;
        }

        /* ★ 호버 이펙트 (Glow & Press - 튀어나오는 대신 안으로 들어가서 깊이감이 드러나도록) */
        @media (hover: hover) {
            .link-btn:hover {
                background-color: rgba(0, 0, 0, 0.5); /* 파내려간 음각 연출을 위해 배경을 차분하게 어둡힘 */
                color: #e2e8f0; /* 자연스럽게 떠오르는 세련된 하이라이트 화이트 */
                border-color: rgba(135, 206, 250, 0.12); /* 제미나이의 신비로운 감성을 아주 은은하게 담은 테두리 */
                
                /* 위로 뜨지 않고, 실제 햅틱 버튼을 누르듯 가라앉는 미세한 음각 변형 */
                transform: scale(0.97) translateY(1px); 
                
                /* 내부 그림자를 정교하게 주어 안쪽 깊숙이 수축한 듯한 정교한 3D 가라앉음(Depressed) 효과 */
                box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.85), 
                            0 1px 1px rgba(255, 255, 255, 0.02);
                z-index: 2; 
            }
        }

        /* ========================================================
           ★ 테블릿 화면 분할 대응 (3열 구조)
           ======================================================== */
        @media (max-width: 1024px) {
            .links-wrapper {
                grid-template-columns: repeat(3, 1fr); 
            }
        }

        /* ========================================================
           ★ 모바일 전용 환경 (2열 구조로 흘러가도록 유동적 반응 처리)
           ======================================================== */
        @media (max-width: 768px) {
            body {
                padding: 0;
                align-items: flex-start; 
                background: #0f172a !important; 
            }

            .slide-container {
                width: 100%;
                min-height: 100vh; 
                border-radius: 0;
                box-shadow: none;
                border: none;
                margin: 0;
                background: linear-gradient(180deg, #111827 0%, #0f172a 100%) !important; 
                overflow: visible;
            }

            .header-bar {
                padding: 0 20px;
                position: sticky; 
                top: 0; 
                background-color: rgba(15, 23, 42, 0.85) !important;
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .bookmark-grid {
                margin: 0; 
                padding: 30px 20px; 
            }

            /* 폰 화면에서 유동적으로 변형되도록 2열로 자연스러운 스케일 매핑 */
            .links-wrapper {
                grid-template-columns: repeat(2, 1fr); 
                gap: 10px;
            }

            .link-btn {
                padding: 8px 12px; 
                font-size: 13.5px; 
                min-height: 48px; /* 터치가 편리하도록 미세 조정 */
                background-color: rgba(255, 255, 255, 0.03); 
            }
        }

        /* 초소형 스마트폰 화면 대응 (1열 구조) */
        @media (max-width: 480px) {
            .links-wrapper {
                grid-template-columns: 1fr; 
            }
        }
    </style>
</head>
<body>

</body>
</html>
